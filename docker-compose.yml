version: '3.8'

services:
  # FastAPI application
  eventlink:
    build: .
    container_name: eventlink-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://eventlink:eventlink_password@postgres:5432/eventlink
      - APP_ENV=staging
      - DEBUG=false
      - LOG_LEVEL=INFO
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-staging}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - EVENTLINK_POC_SECRET=${EVENTLINK_POC_SECRET:-}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn eventlink.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - eventlink-network
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: eventlink-postgres
    environment:
      POSTGRES_DB: eventlink
      POSTGRES_USER: eventlink
      POSTGRES_PASSWORD: eventlink_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventlink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventlink"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: eventlink-redis
    ports:
      - "6379:6379"
    networks:
      - eventlink-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  eventlink-network:
    driver: bridge
