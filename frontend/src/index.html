<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>PromiseLink</title>
  <script>
    // Taro H5 rem baseline: designWidth=750, postcss rootValue=40 -> 750/18.75=40px
    function setRootFontSize() {
      var w = document.documentElement.clientWidth || window.innerWidth;
      // Cap at 750px so desktop layout does not over-scale
      var base = Math.min(w, 750) / 18.75;
      document.documentElement.style.fontSize = base + 'px';
    }
    setRootFontSize();
    window.addEventListener('resize', setRootFontSize);

    // Auto-removes the loading screen on load
    window.addEventListener('DOMContentLoaded', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <style>
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8e8e8;
      border-top-color: #1890ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
  </div>
  <div id="app"></div>
</body>
</html>
