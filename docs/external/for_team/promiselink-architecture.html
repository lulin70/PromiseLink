<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromiseLink 专业版系统架构图</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Virgil', 'Segoe Script', 'Comic Sans MS', 'KaiTi', 'STKaiti', cursive, sans-serif;
    padding: 20px;
  }
  .diagram-container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 20px;
    max-width: 1320px;
    width: 100%;
  }
  svg { width: 100%; height: auto; display: block; }
  .conn { stroke: #475467; stroke-width: 1.8; fill: none; transition: all 0.25s ease; }
  .conn.highlight { stroke: #D92D20; stroke-width: 3.2; filter: url(#glow); }
  .conn.dim { stroke: #D0D5DD; stroke-width: 1; opacity: 0.3; }
  .node-group { cursor: pointer; transition: filter 0.25s ease, opacity 0.25s ease; }
  .node-group.dim { opacity: 0.3; }
  .node-group.highlight { filter: url(#glow); }
  .title-text { font-size: 22px; font-weight: 700; fill: #111827; }
  .subtitle-text { font-size: 12px; fill: #667085; }
  .layer-label { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .node-title { font-size: 12px; font-weight: 700; text-anchor: middle; }
  .node-desc { font-size: 9.5px; text-anchor: middle; }
  .legend-label { font-size: 11px; fill: #475467; }
  .legend-title { font-size: 11px; font-weight: 700; fill: #111827; }
  .conn-label { font-size: 9px; fill: #667085; text-anchor: middle; }
  .tag-pro { font-size: 8px; font-weight: 700; fill: #fff; }
</style>
</head>
<body>
<div class="diagram-container">
<svg viewBox="0 0 1280 980" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="rough-box" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough-line" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.7" fill="#D1D5DB"/>
    </pattern>
    <marker id="arrow-green" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7, 2 3.5" fill="#067647"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7, 2 3.5" fill="#175CD3"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7, 2 3.5" fill="#6941C6"/>
    </marker>
    <marker id="arrow-gray" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7, 2 3.5" fill="#475467"/>
    </marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7, 2 3.5" fill="#C4320A"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1280" height="980" fill="#FFFFFF"/>
  <rect width="1280" height="980" fill="url(#dot-grid)"/>

  <!-- LAYER BANDS -->
  <!-- L1 Mini Program -->
  <rect x="20" y="20" width="1240" height="150" rx="10" fill="#ECFDF3" fill-opacity="0.3" stroke="#067647" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.35"/>
  <text x="40" y="44" class="layer-label" fill="#067647">📱 L1 微信小程序层 · 用户手机端</text>

  <!-- L2 Cloud Gateway -->
  <rect x="20" y="190" width="1240" height="330" rx="10" fill="#EFF8FF" fill-opacity="0.3" stroke="#175CD3" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.35"/>
  <text x="40" y="214" class="layer-label" fill="#175CD3">☁️ L2 云端 AI 网关层 · api.promiselink.com</text>

  <!-- L3 Local Docker -->
  <rect x="20" y="540" width="1240" height="320" rx="10" fill="#F5F3FF" fill-opacity="0.25" stroke="#6941C6" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.35"/>
  <text x="40" y="564" class="layer-label" fill="#6941C6">🏠 L3 用户本地 Docker 层 · 家用电脑</text>

  <!-- External AI band -->
  <rect x="20" y="880" width="1240" height="80" rx="10" fill="#FFF7ED" fill-opacity="0.25" stroke="#C4320A" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.35"/>
  <text x="40" y="904" class="layer-label" fill="#C4320A">🔌 外部 AI 服务 · 第三方 LLM / 语音</text>

  <!-- ============ CONNECTIONS ============ -->
  <g id="connections" filter="url(#rough-line)">

    <!-- L1 → L2: 小程序 → 网关 (HTTPS) -->
    <path id="conn-mp-gw-relay" class="conn" d="M 400 150 Q 400 180 400 220" marker-end="url(#arrow-blue)" data-from="node-mp-voice" data-to="node-gw-nginx"/>
    <text x="410" y="188" class="conn-label">HTTPS</text>

    <path id="conn-mp-gw-https2" class="conn" d="M 700 150 Q 700 180 700 220" marker-end="url(#arrow-blue)" data-from="node-mp-tts" data-to="node-gw-nginx"/>

    <path id="conn-mp-gw-https3" class="conn" d="M 980 150 Q 980 180 980 220" marker-end="url(#arrow-blue)" data-from="node-mp-scan" data-to="node-gw-nginx"/>

    <!-- L2 internal: Nginx → 中继路由器 -->
    <path id="conn-gw-nginx-relay" class="conn" d="M 640 270 L 460 270" marker-end="url(#arrow-blue)" data-from="node-gw-nginx" data-to="node-gw-relay"/>

    <!-- L2 internal: 中继路由器 → AI代理层 -->
    <path id="conn-gw-relay-aiproxy" class="conn" d="M 330 295 L 330 320" marker-end="url(#arrow-blue)" data-from="node-gw-relay" data-to="node-gw-aiproxy"/>

    <!-- L2 internal: 中继路由器 ↔ PG/Redis (via 许可/计费) -->
    <path id="conn-gw-relay-license" class="conn" d="M 260 295 L 200 320" marker-end="url(#arrow-blue)" data-from="node-gw-relay" data-to="node-gw-license"/>
    <path id="conn-gw-license-pg" class="conn" d="M 170 360 L 170 400" marker-end="url(#arrow-blue)" data-from="node-gw-license" data-to="node-gw-pg"/>

    <!-- L2 internal: AI代理层 → API Key池 -->
    <path id="conn-gw-aiproxy-keypool" class="conn" d="M 400 360 L 500 360" marker-end="url(#arrow-blue)" data-from="node-gw-aiproxy" data-to="node-gw-keypool"/>

    <!-- L2 internal: 计费 ↔ Redis -->
    <path id="conn-gw-billing-redis" class="conn" d="M 770 360 L 770 400" marker-end="url(#arrow-blue)" data-from="node-gw-billing" data-to="node-gw-redis"/>

    <!-- L2 → L3: 网关中继 → 本地Docker (WSS, 用户PC主动出站) -->
    <!-- 关键：方向是 本地→网关出站，但中继请求是双向的。用网关→本地的箭头表示中继转发 -->
    <path id="conn-gw-relay-local" class="conn" d="M 330 295 Q 330 470 280 540 Q 240 600 200 620" marker-end="url(#arrow-purple)" data-from="node-gw-relay" data-to="node-local-relay"/>
    <text x="270" y="470" class="conn-label" fill="#6941C6">WSS 中继</text>
    <text x="270" y="482" class="conn-label" fill="#6941C6">(PC主动出站)</text>

    <!-- L3 internal: relay_client → FastAPI业务服务 -->
    <path id="conn-local-relay-fa" class="conn" d="M 330 645 L 400 645" marker-end="url(#arrow-purple)" data-from="node-local-relay" data-to="node-local-fa"/>

    <!-- L3 internal: relay_client → 网关 AI代理 (出站AI调用) -->
    <path id="conn-local-relay-aiproxy" class="conn" d="M 260 620 Q 260 480 400 360" marker-end="url(#arrow-purple)" data-from="node-local-relay" data-to="node-gw-aiproxy"/>
    <text x="150" y="500" class="conn-label" fill="#6941C6">X-AI-Call</text>
    <text x="150" y="512" class="conn-label" fill="#6941C6">代理出站</text>

    <!-- L3 FastAPI → SQLite -->
    <path id="conn-local-fa-sqlite" class="conn" d="M 560 720 L 560 770" marker-end="url(#arrow-purple)" data-from="node-local-fa" data-to="node-local-sqlite"/>

    <!-- L3 FastAPI → Embedding -->
    <path id="conn-local-fa-emb" class="conn" d="M 700 720 L 760 770" marker-end="url(#arrow-purple)" data-from="node-local-fa" data-to="node-local-emb"/>

    <!-- L3 FastAPI → H5 -->
    <path id="conn-local-fa-h5" class="conn" d="M 420 720 L 360 770" marker-end="url(#arrow-purple)" data-from="node-local-fa" data-to="node-local-h5"/>

    <!-- L2 → External AI: AI代理 → DeepSeek/Moka/阿里云 -->
    <path id="conn-gw-aiproxy-deepseek" class="conn" d="M 330 360 Q 330 870 250 910" marker-end="url(#arrow-amber)" data-from="node-gw-aiproxy" data-to="node-ext-deepseek"/>
    <text x="200" y="860" class="conn-label" fill="#C4320A">LLM</text>

    <path id="conn-gw-aiproxy-moka" class="conn" d="M 360 360 Q 560 700 580 910" marker-end="url(#arrow-amber)" data-from="node-gw-aiproxy" data-to="node-ext-moka"/>
    <text x="560" y="700" class="conn-label" fill="#C4320A">LLM/ASR/TTS/OCR</text>

    <path id="conn-gw-aiproxy-aliyun" class="conn" d="M 380 360 Q 900 700 920 910" marker-end="url(#arrow-amber)" data-from="node-gw-aiproxy" data-to="node-ext-aliyun"/>
    <text x="900" y="700" class="conn-label" fill="#C4320A">语音识别</text>

    <!-- L1 → L3: 小程序经网关中继到本地 (示意, 实际经L2) -->
    <!-- 已由 L1→L2 和 L2→L3 表达，不重复 -->

  </g>

  <!-- ============ L1 NODES: 微信小程序 ============ -->
  <g filter="url(#rough-box)">
    <!-- 语音录入 -->
    <g class="node-group" id="node-mp-voice" data-layer="miniapp">
      <rect x="320" y="90" width="160" height="58" rx="8" fill="#ECFDF3" stroke="#067647" stroke-width="2.2"/>
      <text x="400" y="112" class="node-title" fill="#067647">语音录入</text>
      <text x="400" y="128" class="node-desc" fill="#475467">wx.startRecord</text>
      <rect x="326" y="140" width="40" height="3" rx="1.5" fill="#75E0A7"/>
    </g>
    <!-- TTS播报 -->
    <g class="node-group" id="node-mp-tts" data-layer="miniapp">
      <rect x="620" y="90" width="160" height="58" rx="8" fill="#ECFDF3" stroke="#067647" stroke-width="2.2"/>
      <text x="700" y="112" class="node-title" fill="#067647">TTS 播报</text>
      <text x="700" y="128" class="node-desc" fill="#475467">同声传译插件</text>
      <rect x="626" y="140" width="40" height="3" rx="1.5" fill="#75E0A7"/>
    </g>
    <!-- 名片扫描 -->
    <g class="node-group" id="node-mp-scan" data-layer="miniapp">
      <rect x="900" y="90" width="160" height="58" rx="8" fill="#ECFDF3" stroke="#067647" stroke-width="2.2"/>
      <text x="980" y="112" class="node-title" fill="#067647">名片扫描</text>
      <text x="980" y="128" class="node-desc" fill="#475467">wx.scanCode / 拍照</text>
      <rect x="906" y="140" width="40" height="3" rx="1.5" fill="#75E0A7"/>
    </g>
    <!-- H5查询管理 -->
    <g class="node-group" id="node-mp-h5" data-layer="miniapp">
      <rect x="1100" y="90" width="150" height="58" rx="8" fill="#ECFDF3" stroke="#067647" stroke-width="2.2"/>
      <text x="1175" y="112" class="node-title" fill="#067647">H5 查询管理</text>
      <text x="1175" y="128" class="node-desc" fill="#475467">WebView</text>
      <rect x="1106" y="140" width="40" height="3" rx="1.5" fill="#75E0A7"/>
    </g>
  </g>

  <!-- ============ L2 NODES: 云端AI网关 ============ -->
  <g filter="url(#rough-box)">
    <!-- 接入层 Nginx -->
    <g class="node-group" id="node-gw-nginx" data-layer="gateway">
      <rect x="560" y="232" width="200" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="660" y="254" class="node-title" fill="#175CD3">接入层 Nginx + TLS</text>
      <text x="660" y="270" class="node-desc" fill="#475467">HTTPS终止 · WSS升级 · 请求路由</text>
      <rect x="566" y="280" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- 中继路由器 -->
    <g class="node-group" id="node-gw-relay" data-layer="gateway">
      <rect x="220" y="232" width="220" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="330" y="254" class="node-title" fill="#175CD3">中继路由器</text>
      <text x="330" y="270" class="node-desc" fill="#475467">WebSocket连接映射 · 请求转发</text>
      <rect x="226" y="280" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- 许可验证 -->
    <g class="node-group" id="node-gw-license" data-layer="gateway">
      <rect x="80" y="320" width="180" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="170" y="342" class="node-title" fill="#175CD3">许可验证</text>
      <text x="170" y="358" class="node-desc" fill="#475467">PRO_LICENSE · JWT · 限流</text>
      <rect x="86" y="368" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- AI代理层 -->
    <g class="node-group" id="node-gw-aiproxy" data-layer="gateway">
      <rect x="280" y="320" width="220" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="390" y="342" class="node-title" fill="#175CD3">AI 代理层</text>
      <text x="390" y="358" class="node-desc" fill="#475467">LLM · ASR · TTS · OCR 代理</text>
      <rect x="286" y="368" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- API Key池 -->
    <g class="node-group" id="node-gw-keypool" data-layer="gateway">
      <rect x="520" y="320" width="200" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="620" y="342" class="node-title" fill="#175CD3">API Key 池管理器</text>
      <text x="620" y="358" class="node-desc" fill="#475467">轮询 · 限流 · 熔断 · 健康率</text>
      <rect x="526" y="368" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- 用量计费 -->
    <g class="node-group" id="node-gw-billing" data-layer="gateway">
      <rect x="740" y="320" width="200" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="840" y="342" class="node-title" fill="#175CD3">用量计费</text>
      <text x="840" y="358" class="node-desc" fill="#475467">Token计数 · 🟢🟡🔴 红黄绿灯</text>
      <rect x="746" y="368" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- PostgreSQL -->
    <g class="node-group" id="node-gw-pg" data-layer="gateway">
      <rect x="80" y="400" width="180" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="170" y="422" class="node-title" fill="#175CD3">PostgreSQL</text>
      <text x="170" y="438" class="node-desc" fill="#475467">用户账户 · 许可证 · 用量记录</text>
      <rect x="86" y="448" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
    <!-- Redis -->
    <g class="node-group" id="node-gw-redis" data-layer="gateway">
      <rect x="740" y="400" width="200" height="56" rx="8" fill="#EFF8FF" stroke="#175CD3" stroke-width="2.2"/>
      <text x="840" y="422" class="node-title" fill="#175CD3">Redis</text>
      <text x="840" y="438" class="node-desc" fill="#475467">WS连接映射 · JWT缓存 · 限流计数</text>
      <rect x="746" y="448" width="40" height="3" rx="1.5" fill="#93C5FD"/>
    </g>
  </g>

  <!-- ============ L3 NODES: 本地Docker ============ -->
  <g filter="url(#rough-box)">
    <!-- relay_client -->
    <g class="node-group" id="node-local-relay" data-layer="local">
      <rect x="200" y="618" width="200" height="56" rx="8" fill="#F5F3FF" stroke="#6941C6" stroke-width="2.2"/>
      <text x="300" y="640" class="node-title" fill="#6941C6">relay_client</text>
      <text x="300" y="656" class="node-desc" fill="#475467">WSS连接 · AI调用代理 · JWT刷新</text>
      <rect x="206" y="666" width="40" height="3" rx="1.5" fill="#C4B5FD"/>
    </g>
    <!-- FastAPI 业务服务 (大容器) -->
    <g class="node-group" id="node-local-fa" data-layer="local">
      <rect x="440" y="588" width="480" height="140" rx="8" fill="#F5F3FF" stroke="#6941C6" stroke-width="2.2"/>
      <text x="680" y="608" class="node-title" fill="#6941C6">FastAPI 业务服务</text>
      <!-- 内部子模块: 基础版服务 -->
      <rect x="456" y="618" width="100" height="34" rx="4" fill="#fff" stroke="#6941C6" stroke-width="1.2"/>
      <text x="506" y="634" class="node-desc" fill="#6941C6">Event Ingest</text>
      <text x="506" y="645" class="node-desc" fill="#98A2B3">事件录入</text>
      <rect x="562" y="618" width="100" height="34" rx="4" fill="#fff" stroke="#6941C6" stroke-width="1.2"/>
      <text x="612" y="634" class="node-desc" fill="#6941C6">Query Service</text>
      <text x="612" y="645" class="node-desc" fill="#98A2B3">查询服务</text>
      <rect x="668" y="618" width="100" height="34" rx="4" fill="#fff" stroke="#6941C6" stroke-width="1.2"/>
      <text x="718" y="634" class="node-desc" fill="#6941C6">Todo Service</text>
      <text x="718" y="645" class="node-desc" fill="#98A2B3">待办</text>
      <rect x="774" y="618" width="100" height="34" rx="4" fill="#fff" stroke="#6941C6" stroke-width="1.2"/>
      <text x="824" y="634" class="node-desc" fill="#6941C6">Insight Engine</text>
      <text x="824" y="645" class="node-desc" fill="#98A2B3">洞察引擎</text>
      <!-- Pro模块 -->
      <rect x="456" y="660" width="100" height="34" rx="4" fill="#EDE9FE" stroke="#6941C6" stroke-width="1.2"/>
      <text x="506" y="676" class="node-desc" fill="#6941C6">Voice Assistant</text>
      <text x="506" y="687" class="node-desc" fill="#98A2B3">语音助手</text>
      <circle cx="548" cy="664" r="6" fill="#6941C6"/>
      <text x="548" y="667" class="tag-pro" text-anchor="middle">P</text>
      <rect x="562" y="660" width="100" height="34" rx="4" fill="#EDE9FE" stroke="#6941C6" stroke-width="1.2"/>
      <text x="612" y="676" class="node-desc" fill="#6941C6">Media Processor</text>
      <text x="612" y="687" class="node-desc" fill="#98A2B3">媒体处理</text>
      <circle cx="654" cy="666" r="6" fill="#6941C6"/>
      <text x="654" y="669" class="tag-pro" text-anchor="middle">P</text>
      <rect x="668" y="660" width="100" height="34" rx="4" fill="#EDE9FE" stroke="#6941C6" stroke-width="1.2"/>
      <text x="718" y="676" class="node-desc" fill="#6941C6">Email Sync</text>
      <text x="718" y="687" class="node-desc" fill="#98A2B3">邮件同步</text>
      <circle cx="760" cy="666" r="6" fill="#6941C6"/>
      <text x="760" y="669" class="tag-pro" text-anchor="middle">P</text>
      <rect x="774" y="660" width="100" height="34" rx="4" fill="#EDE9FE" stroke="#6941C6" stroke-width="1.2"/>
      <text x="824" y="676" class="node-desc" fill="#6941C6">Privacy Manager</text>
      <text x="824" y="687" class="node-desc" fill="#98A2B3">隐私管理</text>
      <circle cx="866" cy="666" r="6" fill="#6941C6"/>
      <text x="866" y="669" class="tag-pro" text-anchor="middle">P</text>
      <rect x="446" y="716" width="40" height="3" rx="1.5" fill="#C4B5FD"/>
    </g>
    <!-- Taro H5 -->
    <g class="node-group" id="node-local-h5" data-layer="local">

<script>
(function() {
  var nodes = document.querySelectorAll('.node-group');
  var connections = document.querySelectorAll('.conn');
  var nodeConns = {};
  connections.forEach(function(conn) {
    var from = conn.getAttribute('data-from');
    var to = conn.getAttribute('data-to');
    if (from) { if (!nodeConns[from]) nodeConns[from] = []; nodeConns[from].push(conn); }
    if (to) { if (!nodeConns[to]) nodeConns[to] = []; nodeConns[to].push(conn); }
  });

  function highlightNode(nodeId) {
    nodes.forEach(function(n) { n.classList.add('dim'); });
    connections.forEach(function(c) { c.classList.add('dim'); });
    var node = document.getElementById(nodeId);
    if (node) { node.classList.remove('dim'); node.classList.add('highlight'); }
    var conns = nodeConns[nodeId] || [];
    conns.forEach(function(conn) {
      conn.classList.remove('dim'); conn.classList.add('highlight');
      var from = conn.getAttribute('data-from');
      var to = conn.getAttribute('data-to');
      var otherId = (from === nodeId) ? to : from;
      if (otherId) {
        var otherNode = document.getElementById(otherId);
        if (otherNode) { otherNode.classList.remove('dim'); otherNode.classList.add('highlight'); }
      }
    });
  }

  function clearHighlight() {
    nodes.forEach(function(n) { n.classList.remove('dim', 'highlight'); });
    connections.forEach(function(c) { c.classList.remove('dim', 'highlight'); });
  }

  nodes.forEach(function(node) {
    node.addEventListener('mouseenter', function() { highlightNode(node.id); });
    node.addEventListener('mouseleave', function() { clearHighlight(); });
  });
  connections.forEach(function(conn) {
    conn.addEventListener('mouseenter', function() {
      var from = conn.getAttribute('data-from');
      if (from) highlightNode(from);
    });
    conn.addEventListener('mouseleave', function() { clearHighlight(); });
  });
})();
</script>
