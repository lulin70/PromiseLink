# PromiseLink 生产环境部署配置
# 使用预构建镜像（由 CI build-and-push job 推送到 ghcr.io）
# 部署方式: VERSION=0.8.3 docker compose -f docker-compose.prod.yml up -d

version: "3.8"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  cap_drop: [ALL]
  security_opt: ["no-new-privileges:true"]

services:
  promiselink-api:
    image: ghcr.io/${REGISTRY_OWNER:-lulin70}/promiselink:${VERSION:-latest}
    container_name: promiselink-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/promiselink.db
      - REDIS_ENABLED=false
    volumes:
      - /opt/promiselink/data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]

  nginx:
    image: nginx:alpine
    container_name: promiselink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/promiselink/certbot/www:/var/www/certbot:ro
      - /opt/promiselink/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      promiselink-api:
        condition: service_healthy
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    # nginx 需要 CHOWN 修改 cache 目录属主、SETUID/SETGID 切换 worker 进程权限、
    # NET_BIND_SERVICE 绑定 80/443 端口、DAC_OVERRIDE 访问 root 属主文件
    cap_add: [CHOWN, DAC_OVERRIDE, SETUID, SETGID, NET_BIND_SERVICE]

  certbot:
    image: certbot/certbot
    container_name: promiselink-certbot
    restart: unless-stopped
    volumes:
      - /opt/promiselink/certbot/www:/var/www/certbot
      - /opt/promiselink/certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --deploy-hook "docker kill -s HUP promiselink-nginx 2>/dev/null || true";
        sleep 12h & wait $${!};
      done;'
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
