# PromiseLink 托管PoC Nginx配置
# HTTP反向代理 + HTTPS重定向

# HTTP服务器 - 反向代理 + HTTPS重定向
server {
    listen 80;
    server_name promiselink.cn www.promiselink.cn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPS重定向（放在 location / 内，避免拦截 ACME challenge）
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name promiselink.cn www.promiselink.cn;

    ssl_certificate /etc/letsencrypt/live/www.promiselink.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.promiselink.cn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://promiselink-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        client_max_body_size 25m;
    }

    location /health {
        proxy_pass http://promiselink-api:8000/api/v1/health;
        access_log off;
    }
}
