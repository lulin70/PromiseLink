name: Deploy to Production

# 生产环境部署工作流（手动触发）
# 批次3.7: 建立生产部署/回滚工作流
#
# 流程:
#   1. 预检: 验证目标 commit 的 test + e2e + security + playwright-ui 全绿
#   2. 部署: backup → pull image → restart → health check (60s)
#   3. 回滚: 健康检查失败自动回滚到上一个版本 + 打印容器日志
#
# 使用方式:
#   - GitHub Actions UI → "Deploy to Production" → Run workflow
#   - 输入版本号 (如 0.8.0) 和是否跳过预检 (紧急部署时)
#
# 退出码:
#   0 — 部署成功
#   1 — 部署失败,已自动回滚
#   2 — 部署失败且回滚也失败,需人工介入

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 0.8.0)'
        required: true
        type: string
      skip_pre_flight:
        description: 'Skip pre-flight CI checks (use only for emergency hotfix)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  pre-flight:
    name: Pre-flight CI verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci_passed: ${{ steps.check_ci.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify CI passed on target commit
        id: check_ci
        if: ${{ !inputs.skip_pre_flight }}
        uses: actions/github-script@v7
        with:
          script: |
            const commitSha = context.sha;
            core.info(`Checking CI status for commit ${commitSha}`);

            // Fetch recent workflow runs for this commit
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: commitSha,
              per_page: 10,
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed(`No CI runs found for commit ${commitSha}. ` +
                'Push to main first and wait for CI to complete.');
              core.setOutput('passed', 'false');
              return;
            }

            // Find the latest run
            const latestRun = runs.data.workflow_runs[0];
            core.info(`Latest CI run #${latestRun.run_number}: ${latestRun.conclusion || latestRun.status}`);

            if (latestRun.conclusion !== 'success') {
              core.setFailed(`CI run #${latestRun.run_number} did not pass ` +
                `(status: ${latestRun.status}, conclusion: ${latestRun.conclusion}). ` +
                'All CI checks must pass before production deployment. ' +
                'To bypass (emergency only), re-run with skip_pre_flight=true.');
              core.setOutput('passed', 'false');
              return;
            }

            // Verify required jobs specifically (test, e2e, security, playwright-ui)
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: latestRun.id,
              per_page: 30,
            });

            const requiredJobs = ['test', 'e2e', 'security', 'playwright-ui'];
            const jobResults = {};
            for (const job of jobs.data.jobs) {
              jobResults[job.name] = job.conclusion;
            }

            core.info('Required job results:');
            for (const required of requiredJobs) {
              const conclusion = jobResults[required];
              core.info(`  ${required}: ${conclusion}`);
              if (conclusion !== 'success') {
                core.setFailed(`Required job "${required}" did not pass ` +
                  `(conclusion: ${conclusion}). Production deployment blocked.`);
                core.setOutput('passed', 'false');
                return;
              }
            }

            core.info('All required CI jobs passed. Pre-flight check OK.');
            core.setOutput('passed', 'true');

      - name: Skip pre-flight (emergency)
        if: ${{ inputs.skip_pre_flight }}
        run: |
          echo "WARNING: Pre-flight checks skipped (emergency deployment)"
          echo "skip_pre_flight=true was set — deploying without CI verification"
        continue-on-error: true

  deploy:
    name: Deploy with rollback
    needs: pre-flight
    if: ${{ inputs.skip_pre_flight || needs.pre-flight.outputs.ci_passed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ secrets.PROD_DOMAIN || 'promiselink.example.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy production compose file
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)
          ssh-add ~/.ssh/deploy_key
          scp docker-compose.prod.yml ${{ secrets.PROD_USER || 'ubuntu' }}@${{ secrets.PROD_HOST }}:/opt/promiselink/
          scp -r nginx/ ${{ secrets.PROD_USER || 'ubuntu' }}@${{ secrets.PROD_HOST }}:/opt/promiselink/ 2>/dev/null || echo "nginx/ not found, skipping"

      - name: Deploy with automatic rollback
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)
          ssh-add ~/.ssh/deploy_key
          chmod +x scripts/ops/deploy-prod.sh
          ./scripts/ops/deploy-prod.sh \
            ${{ secrets.PROD_HOST }} \
            ${{ secrets.PROD_USER || 'ubuntu' }} \
            ${{ inputs.version }}

      - name: Deployment result
        if: always()
        run: |
          EXIT_CODE=$?
          echo "=========================================="
          if [ $EXIT_CODE -eq 0 ]; then
            echo "PRODUCTION DEPLOYMENT: SUCCESS"
            echo "Version ${{ inputs.version }} is live"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "PRODUCTION DEPLOYMENT: FAILED (auto-rollback succeeded)"
            echo "Version ${{ inputs.version }} failed health check"
            echo "System restored to previous version"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "PRODUCTION DEPLOYMENT: CRITICAL FAILURE"
            echo "Both deploy and rollback failed — manual intervention required"
            echo "Server: ${{ secrets.PROD_HOST }}"
            exit 2
          fi
          echo "=========================================="

  notify:
    name: Notify deployment result
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment summary
        run: |
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          VERSION="${{ inputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${DEPLOY_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${TIMESTAMP} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip pre-flight | ${{ inputs.skip_pre_flight }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$DEPLOY_RESULT" = "success" ]; then
            echo "Result: v${VERSION} deployed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            echo "Result: v${VERSION} failed and was rolled back (or rollback also failed)" >> $GITHUB_STEP_SUMMARY
            echo "Check deployment logs for details" >> $GITHUB_STEP_SUMMARY
          fi
