name: PromiseLink CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promiselink
          POSTGRES_PASSWORD: promiselink_test
          POSTGRES_DB: promiselink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linting
        run: ruff check src/ tests/

      - name: Run type checking
        run: python3 -m mypy src/promiselink --ignore-missing-imports

      - name: Run security audit
        run: pip-audit --desc

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://promiselink:promiselink_test@localhost:5432/promiselink_test
          TEST_MODE: "true"
          LLM_API_KEY: "test-key-for-ci"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          REDIS_ENABLED: "false"
          TZ: Asia/Shanghai
        run: |
          # 排除负载测试:coverage 插桩会使性能测量失效 (100 并发 P95 从 10ms 膨胀到 1185ms)
          # 负载测试在下方 "Run load tests" step 单独无 coverage 执行
          pytest tests/ -v --cov=src/promiselink --cov-report=xml --cov-report=term-missing --cov-fail-under=80 --ignore=tests/test_load_real.py -k "not embedding_provider_local and not embedding_provider_similar and not full_embedding_to_similarity"

      - name: Run load tests (no coverage — performance measurements require clean instrumentation)
        env:
          DATABASE_URL: postgresql+asyncpg://promiselink:promiselink_test@localhost:5432/promiselink_test
          TEST_MODE: "true"
          LLM_API_KEY: "test-key-for-ci"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          REDIS_ENABLED: "false"
          TZ: Asia/Shanghai
        run: |
          pytest tests/test_load_real.py -v --no-cov -o addopts="" --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  e2e:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promiselink
          POSTGRES_PASSWORD: promiselink_test
          POSTGRES_DB: promiselink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start PromiseLink server
        env:
          DATABASE_URL: postgresql+asyncpg://promiselink:promiselink_test@localhost:5432/promiselink_test
          TEST_MODE: "true"
          LLM_API_KEY: "test-key-for-ci"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          REDIS_ENABLED: "false"
          TZ: Asia/Shanghai
        run: |
          python3 -m alembic upgrade head
          python3 -m uvicorn promiselink.main:app --host 0.0.0.0 --port 8000 --log-level debug > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/api/v1/health || (echo "Server failed to start" && cat /tmp/server.log && exit 1)

      - name: Run E2E tests
        run: python3 scripts/e2e/e2e_basic_test.py

      - name: Run E2E user operations tests
        run: python3 -m pytest scripts/e2e/e2e_user_operations_full.py -v --tb=short

      - name: Display server logs
        if: always()
        run: cat /tmp/server.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
            rm -f /tmp/server.pid
          fi

  playwright-ui:
    name: Playwright UI E2E
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium

      - name: Start PromiseLink backend
        env:
          DATABASE_URL: sqlite:///./playwright_test.db
          TEST_MODE: "true"
          LLM_API_KEY: "test-key-for-ci"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          REDIS_ENABLED: "false"
          TZ: Asia/Shanghai
        run: |
          python3 -m alembic upgrade head
          python3 -m uvicorn promiselink.main:app --host 0.0.0.0 --port 8000 --log-level warning > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/api/v1/health || (echo "Backend failed to start" && cat /tmp/server.log && exit 1)

      - name: Run Playwright UI E2E tests
        env:
          CI: true
        working-directory: frontend
        run: npx playwright test --reporter=line --retries=1

      - name: Display backend logs
        if: always()
        run: cat /tmp/server.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
            rm -f /tmp/server.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  e2e-nightly:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promiselink
          POSTGRES_PASSWORD: promiselink_test
          POSTGRES_DB: promiselink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install httpx for E2E tests
        run: pip install httpx

      - name: Start PromiseLink server
        env:
          DATABASE_URL: postgresql+asyncpg://promiselink:promiselink_test@localhost:5432/promiselink_test
          TEST_MODE: "true"
          LLM_API_KEY: "test-key-for-ci"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          REDIS_ENABLED: "false"
          TZ: Asia/Shanghai
        run: |
          python3 -m alembic upgrade head
          python3 -m uvicorn promiselink.main:app --host 0.0.0.0 --port 8000 --log-level debug > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/api/v1/health || (echo "Server failed to start" && cat /tmp/server.log && exit 1)

      - name: Run E2E basic test
        run: python3 scripts/e2e/e2e_basic_test.py

      - name: Run E2E smoke test
        run: python3 scripts/e2e/e2e_smoke_test.py

      - name: Run E2E user journey
        run: python3 scripts/e2e/e2e_user_journey.py

      - name: Run E2E full user journey
        run: python3 scripts/e2e/e2e_full_user_journey.py

      - name: Display server logs
        if: always()
        run: cat /tmp/server.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
            rm -f /tmp/server.pid
          fi

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build:h5

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json -ll

      - name: Run pip-audit
        run: pip-audit --desc

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  build-and-push:
    # 批次3.4: 完整依赖链 — test(单测+覆盖率) + e2e(集成) + frontend(tsc+build) + security(bandit+pip-audit) + playwright-ui(UI E2E)
    # 任一前置失败则不构建推送镜像，避免 broken image 进入 registry
    needs: [test, e2e, frontend, security, playwright-ui]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'version = "' pyproject.toml | head -1 | sed 's/.*version = "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
          # Docker tags must be lowercase; github.repository may contain uppercase
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.version.outputs.repo_lower }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          docker pull ghcr.io/${{ steps.version.outputs.repo_lower }}:${{ steps.version.outputs.version }}
          docker run --rm ghcr.io/${{ steps.version.outputs.repo_lower }}:${{ steps.version.outputs.version }} \
            python -c "import promiselink; print(f'PromiseLink v{promiselink.__version__} OK')"

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)
          ssh-add ~/.ssh/deploy_key
          chmod +x scripts/ops/deploy-staging.sh
          ./scripts/ops/deploy-staging.sh ${{ secrets.STAGING_HOST }} ${{ secrets.STAGING_USER || 'ubuntu' }}
